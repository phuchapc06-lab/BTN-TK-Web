<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />

    <title>Food</title>
  </head>
  <body>
    <section class="section-hero">
      <div class="hero">
        <div class="hero-text-box">
          <h1 class="heading-primary">
            A healthy meal delivered to your door, every single day
          </h1>
          <p class="hero-description">
            Gói đăng ký thực phẩm thông minh 365 ngày/năm giúp bạn ăn uống lành
            mạnh trở lại. Được cá nhân hóa theo khẩu vị và nhu cầu dinh dưỡng
            của riêng bạn. Năm ngoái, chúng tôi đã giao hơn 250.000 bữa ăn!
          </p>
          <a href="#" class="btn">Bắt đầu ăn uống lành mạnh</a>
          <a href="#" class="btn">Tìm hiểu thêm</a>
        </div>
        <div class="hero-image-box">
          <img
            src="img/hero.png"
            class="hero-img"
            alt="woman enjoying food, meals in storage container, and food bowls on a table"
          />
        </div>
      </div>
    </section>
  </body>
</html>
